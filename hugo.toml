baseURL = "https://zentinelle.ai/"
languageCode = "en-us"
title = "Zentinelle — Runtime Governance for AI Agents"
theme = "zentinelle"
disableFastRender = true

[params]
  description = "Zentinelle sits between your AI agents and their LLM providers, enforcing policies, logging every action, and providing a real-time compliance dashboard."
  github = "https://github.com/calliopeai/zentinelle"
  sdk = "https://github.com/calliopeai/zentinelle-sdk"
  docs = "https://zentinelle.dev"

[build]
  writeStats = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

ignoreLogs = ['warning-goldmark-raw-html']

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
