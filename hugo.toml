baseURL = "https://zentinelle.ai/"
languageCode = "en-us"
title = "Zentinelle — Governance, Risk & Compliance for AI Agents"
theme = "zentinelle"

[params]
  version = "1.0.0"
  description = "Zentinelle sits between your AI agents and their LLM providers, enforcing policies, scanning content, logging activity, and giving you a real-time GRC portal."
  github = "https://github.com/calliopeai/zentinelle"
  sdk = "https://github.com/calliopeai/zentinelle-sdk"
  docs = "https://zentinelle.dev"
  pypi = "https://pypi.org/project/zentinelle/"
  npm = "https://www.npmjs.com/package/zentinelle"

[build]
  writeStats = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

ignoreLogs = ['warning-goldmark-raw-html']

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
