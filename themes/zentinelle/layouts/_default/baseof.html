<!DOCTYPE html>
<html lang="en" class="h-full antialiased" style="--font-sora:'Sora','Sora Fallback';--font-inter:'Inter','Inter Fallback';--font-boldonse:'Boldonse';">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" href="/favicon.ico" sizes="256x256" type="image/x-icon">
  <link rel="stylesheet" href="/css/compiled.css">
  <link rel="stylesheet" href="/css/globals.css">
</head>
<body class="min-h-full flex flex-col">
<div style="opacity:1;transform:none">
<div class="relative bg-[#0b0b19] min-h-screen w-full">
{{- partial "navbar.html" . -}}
{{- block "main" . }}{{- end }}
{{- block "footer" . }}{{- partial "footer.html" . -}}{{- end }}
</div>
<button aria-label="Back to top" class="fixed bottom-8 right-8 z-[100] flex items-center justify-center w-[44px] h-[44px] rounded-full border border-[#37efed]/40 bg-[#0b0b19] hover:bg-[#37efed]/10 transition-all duration-300" style="opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity 0.3s ease, transform 0.3s ease, background-color 0.2s ease">
<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
<path d="M8 12V4M8 4L4 8M8 4L12 8" stroke="#37efed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
</path>
</svg>
</button>
</div>
<script src="/js/site.js" defer></script>
</body>
</html>
